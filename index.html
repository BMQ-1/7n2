<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSP فولاذي: يمنع أي اتصال خارجي نهائياً -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:; form-action 'none'; frame-ancestors 'none'; base-uri 'none';">
    <meta name="description" content="حِصْن 3.0 - تشفير معزول (Air-Gapped) بدرجة عسكرية">
    <title>حِصْن 3.0 | العزل التام</title>
    
<style>
    :root {
        --bg-dark: #030712; --surface: #111827; --surface-hover: #1f2937;
        --border: #374151; --text: #f9fafb; --text-muted: #9ca3af;
        --primary: #10b981; --secondary: #3b82f6; --danger: #ef4444; --warning: #f59e0b;
        --radius: 12px;
        --font-sys: system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sys); }

    body { background-color: var(--bg-dark); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .app-container { width: 100%; max-width: 600px; }

    header { text-align: center; margin-bottom: 1.5rem; }
    .brand-title { font-weight: 900; font-size: 3.5rem; color: var(--primary); letter-spacing: -1px; text-shadow: 0 0 20px rgba(16,185,129,0.2); }
    .tagline { color: var(--text-muted); font-size: 1rem; margin-top: 0.5rem; }

    .main-nav { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.4rem; margin-bottom: 1.5rem; gap: 0.4rem; flex-wrap: wrap; }
    .nav-btn { flex: 1 1 calc(33% - 0.5rem); min-width: 120px; background: transparent; border: none; color: var(--text-muted); font-size: 0.9rem; font-weight: bold; padding: 0.8rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .nav-btn.active { background: var(--border); color: #fff; }
    .nav-btn.special { background: rgba(59, 130, 246, 0.1); color: var(--secondary); border: 1px solid var(--secondary); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .view-section { display: none; } .view-section.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .input-group { margin-bottom: 1.2rem; }
    .input-label { display: block; font-weight: bold; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
    .custom-input, .custom-textarea { width: 100%; background: #000; border: 1px solid var(--border); color: var(--text); padding: 0.9rem; border-radius: 8px; outline: none; font-size: 1rem; transition: 0.2s; }
    .custom-input:focus, .custom-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(16,185,129,0.1); }
    .custom-textarea { height: 110px; resize: vertical; }

    .password-wrapper { position: relative; }
    .password-wrapper button { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.2rem; cursor: pointer; opacity: 0.7; }

    /* Entropy Meter */
    .entropy-bar-bg { width: 100%; height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .entropy-bar-fill { height: 100%; width: 0%; background: var(--danger); transition: width 0.3s, background 0.3s; }
    .entropy-text { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; display: flex; justify-content: space-between; }

    .btn-main { width: 100%; padding: 1rem; background: var(--primary); color: #000; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-main.decrypt-btn { background: var(--secondary); color: #fff; }
    .btn-main:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

    .result-container { display: none; margin-top: 1.5rem; background: #000; border: 1px dashed var(--primary); padding: 1rem; border-radius: 8px; }
    .result-text { font-family: monospace; font-size: 0.9rem; color: var(--primary); word-break: break-all; max-height: 150px; overflow-y: auto; line-height: 1.5; padding: 10px; background: rgba(16,185,129,0.05); border-radius: 4px; }
    
    /* Anti-Shoulder Surfing */
    .blurred-text { filter: blur(6px); user-select: none; transition: filter 0.2s; color: #fff; }
    .blurred-text.revealed { filter: blur(0); user-select: text; }
    .reveal-btn { background: #333; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; margin-bottom: 10px; }

    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn-secondary { background: #222; color: #fff; border: 1px solid var(--border); padding: 0.8rem; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 5px;}
    .btn-secondary:hover { background: #333; }
    .btn-danger { grid-column: span 2; background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: var(--danger); }

    .alert-box { background: rgba(59, 130, 246, 0.1); border-right: 4px solid var(--secondary); padding: 0.8rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: #fff; line-height: 1.6; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: #fff; color: #000; padding: 0.8rem 1.5rem; border-radius: 20px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 class="brand-title">حِصْن 3.0</h1>
        <p class="tagline">النسخة المعزولة (Air-Gapped Edition) 🛡️</p>
    </header>

    <nav class="main-nav">
        <button class="nav-btn active" data-view="encrypt">🔒 تشفير</button>
        <button class="nav-btn" data-view="decrypt">🔓 فك تشفير</button>
        <button class="nav-btn special" onclick="downloadAirGappedApp()">⬇️ حفظ الأداة محلياً</button>
    </nav>

    <main class="card">
        <!-- 1. قسم التشفير -->
        <section id="view-encrypt" class="view-section active">
            
            <div class="alert-box">
                للحماية القصوى: استخدم الأداة بعد فصل الإنترنت. استخدم زر <strong>(حفظ كملف)</strong> لتجنب سرقة النص من برامج مراقبة الحافظة (Clipboard Malware).
            </div>

            <div class="input-group">
                <label class="input-label">الرسالة السرية (الطول مُموّه تلقائياً):</label>
                <textarea id="enc-text" class="custom-textarea" placeholder="اكتب النص الحساس..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">كلمة مرور التشفير (يجب تحقيق 60-bit كحد أدنى):</label>
                <div class="password-wrapper">
                    <input type="password" id="enc-password" class="custom-input" placeholder="استخدم أرقام، رموز، وحروف...">
                    <button type="button" onclick="togglePassword('enc-password')">👁️</button>
                </div>
                <div class="entropy-bar-bg"><div class="entropy-bar-fill" id="enc-entropy-fill"></div></div>
                <div class="entropy-text">
                    <span id="enc-entropy-status">ضعيف جداً</span>
                    <span id="enc-entropy-bits">0 Bits</span>
                </div>
            </div>

            <button class="btn-main" id="btn-encrypt" disabled>تشفير النص 🔒</button>

            <div class="result-container" id="enc-result-box">
                <div class="input-label">النص المشفر:</div>
                <div class="result-text" id="enc-result-text"></div>
                <div class="actions-grid">
                    <button class="btn-secondary" onclick="downloadText('enc-result-text', 'Encrypted_Message.txt')">💾 تحميل كملف</button>
                    <button class="btn-secondary" onclick="copyToClipboard('enc-result-text')">📋 نسخ</button>
                </div>
            </div>
        </section>

        <!-- 2. قسم فك التشفير -->
        <section id="view-decrypt" class="view-section">
            <div class="input-group">
                <label class="input-label">الصق النص المشفر (أو محتوى الملف):</label>
                <textarea id="dec-text" class="custom-textarea" placeholder="HisnLock:..."></textarea>
            </div>

            <div class="input-group">
                <label class="input-label">كلمة المرور:</label>
                <div class="password-wrapper">
                    <input type="password" id="dec-password" class="custom-input">
                    <button type="button" onclick="togglePassword('dec-password')">👁️</button>
                </div>
            </div>

            <button class="btn-main decrypt-btn" id="btn-decrypt">فك التشفير 🔓</button>

            <div class="result-container" id="dec-result-box" style="border-color: var(--secondary);">
                <div class="input-label" style="display:flex; justify-content: space-between; align-items:center;">
                    الرسالة الأصلية:
                    <button class="reveal-btn" id="btn-reveal" onmousedown="revealText()" onmouseup="hideText()" onmouseleave="hideText()" ontouchstart="revealText()" ontouchend="hideText()">👁️ اضغط مطولاً للرؤية</button>
                </div>
                <div class="result-text blurred-text" id="dec-result-text" style="font-family: var(--font-sys); font-size: 1.1rem;"></div>
                
                <div class="actions-grid">
                    <button class="btn-secondary" onclick="downloadText('dec-result-text', 'Decrypted_Secret.txt')">💾 استخراج كملف</button>
                    <button class="btn-secondary" onclick="copyToClipboard('dec-result-text')">📋 نسخ</button>
                    <button class="btn-secondary btn-danger" onclick="wipeMemory()">🧹 تدمير البيانات من الذاكرة والشاشة</button>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="toast" id="toast">تم!</div>

<script>
    // --- UI Navigation ---
    document.querySelectorAll('.nav-btn[data-view]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`view-${btn.dataset.view}`).classList.add('active');
        });
    });

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast show ${isError ? 'error' : ''}`;
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function togglePassword(id) {
        const inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    // --- Threat Mitigation: Clipboard Logger Bypass ---
    function copyToClipboard(id) {
        navigator.clipboard.writeText(document.getElementById(id).innerText)
            .then(() => showToast('تم النسخ! (يُفضل استخدام زر الملف للحماية)'))
            .catch(() => showToast('فشل النسخ', true));
    }

    function downloadText(elementId, filename) {
        const text = document.getElementById(elementId).innerText;
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
        showToast('تم الحفظ كملف بنجاح 💾');
    }

    // --- Threat Mitigation: Supply Chain / Origin Compromise Bypass ---
    function downloadAirGappedApp() {
        // تنظيف الشاشة قبل التحميل لضمان عدم حفظ كلمات المرور
        wipeMemory(); 
        const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "HisnLock_Offline.html"; a.click();
        URL.revokeObjectURL(url);
        showToast('تم تحميل الأداة! افتحها محلياً بدون إنترنت 🛡️');
    }

    // --- Threat Mitigation: Shoulder Surfing ---
    function revealText() { document.getElementById('dec-result-text').classList.add('revealed'); }
    function hideText() { document.getElementById('dec-result-text').classList.remove('revealed'); }

    function wipeMemory() {
        document.getElementById('dec-result-text').innerText = '';
        document.getElementById('enc-text').value = '';
        document.getElementById('dec-text').value = '';
        document.getElementById('enc-password').value = '';
        document.getElementById('dec-password').value = '';
        document.getElementById('dec-result-box').style.display = 'none';
        document.getElementById('enc-result-box').style.display = 'none';
        document.getElementById('enc-entropy-fill').style.width = '0%';
        document.getElementById('btn-encrypt').disabled = true;
        navigator.clipboard.writeText(' '); // تنظيف الـ Clipboard
        showToast('تم تدمير البيانات 🧹');
    }

    // --- Threat Mitigation: Mathematical Entropy Enforcer ---
    function calcEntropy(pwd) {
        let pool = 0;
        if (/[a-z]/.test(pwd) || /[أ-ي]/.test(pwd)) pool += 28;
        if (/[A-Z]/.test(pwd)) pool += 26;
        if (/[0-9]/.test(pwd)) pool += 10;
        if (/[^a-zA-Z0-9أ-ي\s]/.test(pwd)) pool += 32;
        return pool === 0 ? 0 : pwd.length * Math.log2(pool);
    }

    document.getElementById('enc-password').addEventListener('input', (e) => {
        const bits = calcEntropy(e.target.value);
        const fill = document.getElementById('enc-entropy-fill');
        const status = document.getElementById('enc-entropy-status');
        const bitTxt = document.getElementById('enc-entropy-bits');
        const btn = document.getElementById('btn-encrypt');
        
        bitTxt.innerText = Math.round(bits) + ' Bits';
        const percent = Math.min((bits / 80) * 100, 100);
        fill.style.width = percent + '%';

        if (bits < 40) {
            fill.style.background = 'var(--danger)'; status.innerText = 'ضعيف جداً ❌'; btn.disabled = true;
        } else if (bits < 60) {
            fill.style.background = 'var(--warning)'; status.innerText = 'متوسط (غير مقبول) ⚠️'; btn.disabled = true;
        } else {
            fill.style.background = 'var(--primary)'; status.innerText = 'قوي (جاهز للتشفير) ✅'; btn.disabled = false;
        }
    });

    // --- Hardened Crypto Core (AES-GCM-256 + PBKDF2 600k + Padding) ---
    const enc = new TextEncoder(), dec = new TextDecoder();
    const ITERATIONS = 600000, BLOCK_SIZE = 256;

    async function getKey(pwd, salt) {
        const material = await window.crypto.subtle.importKey("raw", enc.encode(pwd), {name: "PBKDF2"}, false, ["deriveKey"]);
        return window.crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: ITERATIONS, hash: "SHA-256" },
            material, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
        );
    }

    function pad(plain) {
        const len = plain.length;
        const total = Math.ceil((len + 4) / BLOCK_SIZE) * BLOCK_SIZE;
        const padded = new Uint8Array(total);
        window.crypto.getRandomValues(padded); 
        new DataView(padded.buffer).setUint32(0, len, false);
        padded.set(plain, 4);
        return padded;
    }

    function unpad(padded) {
        const len = new DataView(padded.buffer).getUint32(0, false);
        if (len > padded.length - 4) throw new Error("Corrupt");
        return padded.slice(4, 4 + len);
    }

    function buf2b64(buf) {
        const bytes = new Uint8Array(buf);
        let bin = ''; for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
        return window.btoa(bin);
    }

    function b642buf(b64) {
        const bin = window.atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes;
    }

    // Encrypt
    document.getElementById('btn-encrypt').addEventListener('click', async () => {
        const text = document.getElementById('enc-text').value;
        const pwd = document.getElementById('enc-password').value;
        const btn = document.getElementById('btn-encrypt');
        if (!text) return showToast('أدخل النص!', true);

        try {
            btn.disabled = true; btn.innerText = 'جاري التشفير...';
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const key = await getKey(pwd, salt);
            
            const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, pad(enc.encode(text)));
            const encBytes = new Uint8Array(encrypted);
            const combined = new Uint8Array(28 + encBytes.byteLength);
            combined.set(salt, 0); combined.set(iv, 16); combined.set(encBytes, 28);

            document.getElementById('enc-result-text').innerText = "HisnLock:" + buf2b64(combined);
            document.getElementById('enc-result-box').style.display = 'block';
            showToast('تم التشفير والتمويه! 🔒');
        } catch (err) {
            showToast('حدث خطأ!', true);
        } finally { btn.disabled = false; btn.innerText = 'تشفير النص 🔒'; }
    });

    // Decrypt
    document.getElementById('btn-decrypt').addEventListener('click', async () => {
        let raw = document.getElementById('dec-text').value.trim();
        const pwd = document.getElementById('dec-password').value;
        const btn = document.getElementById('btn-decrypt');
        if (!raw || !pwd) return showToast('أدخل النص وكلمة المرور', true);
        if (raw.startsWith("HisnLock:")) raw = raw.replace("HisnLock:", "");

        try {
            btn.disabled = true; btn.innerText = 'جاري الكسر...';
            const combined = b642buf(raw);
            const key = await getKey(pwd, combined.slice(0, 16));
            
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: combined.slice(16, 28) }, key, combined.slice(28)
            );

            document.getElementById('dec-result-text').innerText = dec.decode(unpad(new Uint8Array(decrypted)));
            document.getElementById('dec-result-box').style.display = 'block';
            showToast('تم استخراج الرسالة السرية! 🔓');
        } catch (err) {
            showToast('فشل! كلمة المرور خاطئة أو النص تالف', true);
        } finally { btn.disabled = false; btn.innerText = 'فك التشفير 🔓'; }
    });
</script>
</body>
</html>
